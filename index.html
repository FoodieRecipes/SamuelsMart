<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samuel'sMart - Quality Groceries</title>
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/products.css">
    <link rel="stylesheet" href="assets/css/responsive.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">🛒 Samuel'sMart</div>
            <ul class="nav-links">
               <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="cart.html">Cart (<span id="cart-count">0</span>)</a></li>
                <li><a href="checkout.html">Checkout</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <a href="admin.html" class="nav-domain">Admin</a>
        </nav>
    </header>

    <section class="hero">
        <div class="hero-content">
            <h1>Welcome to Samuel'sMart</h1>
            <br>
            <p>Fresh Groceries • Best Prices • Fast Delivery</p>
            <br>
            <button onclick="window.location.href='products.html'" class="cta-button">Shop Now</button>
        </div>
    </section>
    
    <section class="section" id="featured">
        <h2>Featured Products</h2>
        <div class="products-grid" id="featured-products"></div>
    </section>

    <!-- Comment Section -->
    <section class="section comment-section-wrapper">
        <div class="comment-section">
            <h2>Message from Dr. Anietie</h2>
            <form id="comment-form">
                <input type="text" id="name" value="Dr. Anietie" required>
                <input type="email" id="email" placeholder="Your Email">
                <textarea id="message" rows="5" placeholder="Enter your message..." required></textarea>
                <button type="submit" class="cta-button">Send Instruction</button>
            </form>
            <div id="comment-status"></div>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 Samuel'sMart • Quality You Can Trust</p>
    </footer>

    <script src="assets/js/script.js"></script>
    <script src="assets/js/products.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
     // Initialize EmailJS with your Public Key
        emailjs.init("o5DbEyLYyWBEk78xM");

        document.getElementById('comment-form').addEventListener('submit', function(e) {
            e.preventDefault();

            const status = document.getElementById('comment-status');
            status.innerHTML = "Sending...";

            const templateParams = {
                name: document.getElementById('name').value,
                email: document.getElementById('email').value || "No email provided",
                message: document.getElementById('message').value,
                date: new Date().toLocaleString()
            };

            emailjs.send("service_yqgx6ez", "template_ashlupn", templateParams)
                .then(() => {
                    status.style.color = "green";
                    status.innerHTML = "✅ Message sent successfully to your email!";
                    document.getElementById('message').value = "";
                })
                .catch((error) => {
                    status.style.color = "red";
                    status.innerHTML = "❌ Failed to send. Please try again.";
                    console.error(error);
                });
        });
    </script>
</body>
</html>
