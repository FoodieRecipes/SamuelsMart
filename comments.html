<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments - Store</title>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
    <header>
        <nav>
            <div class="logo">Store Logo</div>
        </nav>
    </header>

    <section class="section">
        <div class="comment-section">
            <h2>Customer Comments</h2>
            <form id="comment-form">
                <input type="text" id="name" value="Dr. Anietie">
                <textarea id="message" rows="6" placeholder="Write your comment..."></textarea>
                <button type="submit" class="cta-button">Submit Comment</button>
            </form>
            <div id="comment-status"></div>
        </div>
    </section>
</body>
</html>
